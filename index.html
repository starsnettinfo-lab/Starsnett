<body>
<div id="header">
  <div class="htop">
    <div class="logo">&#11088;</div>
    <div><div class="title">STARSNETT SERVICES</div><div class="sub">QUI EST OU ?</div></div>
    <div id="stats">...</div>
  </div>
  <div class="sync-bar">
    <button class="sync-btn sync-save" onclick="cloudSync()" id="syncBtn">Sync</button>
    <button class="sync-btn sync-cfg" onclick="openSyncConfig()">&#9881;</button>
    <button onclick="syncPegase()" style="background:#E9C46A22;color:#E9C46A;border:1px solid #E9C46A55;border-radius:6px;font-size:11px;padding:4px 9px;cursor:pointer;font-weight:600;margin-left:4px;">Pegase</button>
    <span class="sync-info" id="syncInfo"><span class="sync-pulse"></span>Non configure</span>
    <button class="mode-badge consult" id="modeBadge" onclick="onModeBadgeClick()">Connexion</button>
  </div>
  <div class="modal-overlay" id="syncModal">
    <div class="modal" style="max-width:420px">
      <div class="modal-title"><span>Synchronisation cloud</span><button class="modal-close" onclick="closeSyncConfig()">&#10005;</button></div>
      <div class="field-group"><label class="field-label">Cle API JSONBin</label><input class="field-input" id="jbApiKey" type="password" placeholder="$2b$10$..."></div>
      <div class="field-group"><label class="field-label">ID du coffre</label><input class="field-input" id="jbBinId" type="text" placeholder="Sera cree automatiquement"></div>
      <div id="syncStatus" style="font-size:12px;color:#8892A4;margin-bottom:12px;min-height:18px"></div>
      <div class="modal-actions">
        <button class="btn-save" onclick="setupSync()">Creer &amp; connecter</button>
        <button class="btn-cancel" onclick="closeSyncConfig()">Fermer</button>
      </div>
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid #2A2D3E">
        <div style="font-size:11px;color:#8892A4;margin-bottom:8px">Sauvegarde manuelle</div>
        <div style="display:flex;gap:8px">
          <button class="sync-btn sync-save" style="flex:1" onclick="saveJSON()">Exporter JSON</button>
          <button class="sync-btn sync-load" style="flex:1" onclick="document.getElementById('jsonFileInput').click()">Importer JSON</button>
          <input type="file" id="jsonFileInput" accept=".json" style="display:none" onchange="loadJSON(event)">
        </div>
      </div>
    </div>
  </div>
  <input id="search" type="search" placeholder="Rechercher site, agent..." oninput="onSearch()">
  <div class="tabs">
    <button class="tab on"  onclick="setView('today')">Aujourd'hui</button>
    <button class="tab"     onclick="setView('agents')">Agents</button>
    <button class="tab"     onclick="setView('sites')">Sites</button>
    <button class="tab"     onclick="setView('compta')"      style="background:#E9C46A22;color:#E9C46A;" id="tabCompta">Compta</button>
    <button class="tab"     onclick="setView('calendar')"    style="background:#2A9D8F22;color:#2A9D8F;" id="tabCalendar">Calendrier</button>
    <button class="tab"     onclick="setView('archives')"    style="background:#FB560722;color:#FB5607;" id="tabArchives">Archives</button>
    <button class="tab"     onclick="setView('vitrerie')"    style="background:#4CC9F022;color:#4CC9F0;" id="tabVitrerie">&#129695; Vitres</button>
  </div>
</div>
<div id="main"></div>

<!-- PIN Overlay -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <div class="pin-title">Acces administrateur</div>
    <div class="pin-sub" id="pinSubtitle">Entrez votre code PIN a 4 chiffres</div>
    <div class="pin-dots" id="pinDots"><div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div><div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div></div>
    <div class="pin-error" id="pinError"></div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinPress('1')">1</button><button class="pin-key" onclick="pinPress('2')">2</button><button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button><button class="pin-key" onclick="pinPress('5')">5</button><button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button><button class="pin-key" onclick="pinPress('8')">8</button><button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key" style="visibility:hidden"></button><button class="pin-key" onclick="pinPress('0')">0</button><button class="pin-key del" onclick="pinDel()">&#9003;</button>
    </div>
    <button class="pin-cancel" onclick="closePinOverlay()">Annuler</button>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal" onclick="closeDetail()">
  <div class="modal" id="detailModalBox" onclick="event.stopPropagation()" style="max-width:560px;max-height:88vh;overflow-y:auto;">
    <div class="modal-title" style="position:sticky;top:0;background:#1a1d2e;z-index:2;padding-bottom:10px;">
      <span id="detailTitle" style="font-size:16px;font-weight:700;"></span>
      <div style="display:flex;gap:8px;align-items:center;">
        <button id="detailEditBtn" onclick="closeDetail();openEdit(window._detailIdx)" style="background:#2A9D8F22;color:#2A9D8F;border:1px solid #2A9D8F44;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:12px;">Modifier</button>
        <button class="modal-close" onclick="closeDetail()">&#10005;</button>
      </div>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title"><span id="modalTitleText">Modifier la fiche</span><button class="modal-close" onclick="closeModal()">&#10005;</button></div>
    <div class="field-group"><label class="field-label">Nom du site</label><input class="field-input" id="fldNom" type="text"></div>
    <div class="field-group"><label class="field-label">Agent</label><input class="field-input" id="fldAgent" type="text" list="agentsList"><datalist id="agentsList"></datalist></div>
    <div class="field-group"><label class="field-label">Adresse / Codes</label><textarea class="field-textarea" id="fldAdresse"></textarea></div>
    <div class="field-group"><label class="field-label">Jours de passage</label><input class="field-input" id="fldJours" type="text"></div>
    <div class="field-group"><label class="field-label">Frequence / Contact</label><input class="field-input" id="fldFreq" type="text"></div>
    <div class="field-group"><label class="field-label">Vitrerie</label><input class="field-input" id="fldVitrerie" type="text"></div>
    <div class="field-group"><label class="field-label">Duree (heures)</label><input class="field-input" id="fldDuree" type="text" style="max-width:120px;"></div>
    <div class="field-group"><label class="field-label">Consignes / Notes</label><textarea class="field-textarea" id="fldNotes"></textarea></div>
    <div class="field-group">
      <label class="field-label">Date d'ouverture du contrat</label>
      <input class="field-input" id="fldDateContrat" type="text" placeholder="JJ/MM/AAAA" style="max-width:160px;">
      <div id="fldDateContratInfo" style="font-size:11px;color:#888;margin-top:4px;"></div>
    </div>
    <div class="field-group">
      <label class="field-label">Photo du site</label>
      <input type="file" id="fldPhoto" accept="image/*" onchange="previewPhoto(this)" style="display:none;">
      <button type="button" onclick="document.getElementById('fldPhoto').click()" style="background:#1a1d2e;color:#aaa;border:1px solid #2A2D3E;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;">Choisir une photo</button>
      <div id="photoPreview" style="margin-top:8px;"></div>
      <div id="photoRemoveRow" style="display:none;margin-top:4px;"><button type="button" onclick="removePhoto()" style="background:#E6394622;color:#E63946;border:1px solid #E6394644;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:11px;">Supprimer la photo</button></div>
    </div>
    <div style="margin-top:14px;border-top:1px solid #2A2D3E;padding-top:12px">
      <div style="font-size:12px;font-weight:700;color:#E63946;margin-bottom:8px">Alertes</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#E8ECF0;cursor:pointer">
          <input type="checkbox" id="fldResiliation" onchange="document.getElementById('resilRow').style.display=this.checked?'block':'none'" style="width:16px;height:16px;accent-color:#E63946"> Resiliation recue
        </label>
      </div>
      <div id="resilRow" style="display:none;margin-bottom:8px;background:#E6394611;border-radius:8px;padding:10px;">
        <label style="font-size:11px;color:#8892A4;display:block;margin-bottom:4px">Date de fin de contrat</label>
        <input type="date" id="fldDateFin" style="width:100%;background:#0F1117;border:1px solid #E63946;border-radius:8px;color:#E8ECF0;font-size:13px;padding:8px;margin-bottom:8px">
        <label style="font-size:11px;color:#8892A4;display:block;margin-bottom:4px">Note resiliation</label>
        <input type="text" id="fldNoteResil" style="width:100%;background:#0F1117;border:1px solid #2A2D3E;border-radius:8px;color:#E8ECF0;font-size:13px;padding:8px">
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#E8ECF0;cursor:pointer">
          <input type="checkbox" id="fldImpaye" onchange="document.getElementById('impayeRow').style.display=this.checked?'block':'none'" style="width:16px;height:16px;accent-color:#FB5607"> Impaye en cours
        </label>
      </div>
      <div id="impayeRow" style="display:none;margin-top:6px;background:#FB560711;border-radius:8px;padding:10px;">
        <label style="font-size:11px;color:#8892A4;display:block;margin-bottom:4px">Montant impaye (€)</label>
        <input type="number" id="fldMontantImpaye" style="width:100%;background:#0F1117;border:1px solid #2A2D3E;border-radius:8px;color:#E8ECF0;font-size:13px;padding:8px">
      </div>
    </div>
    <div id="archiveRow" style="display:none;margin-bottom:8px;margin-top:10px;">
      <button type="button" onclick="archiveSite()" style="background:#FB560722;color:#FB5607;border:1px solid #FB560744;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px;width:100%;">Archiver ce site</button>
    </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveEdit()">Enregistrer</button>
      <button class="btn-delete" onclick="confirmDelete()">&#128465;</button>
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="confirm-overlay" id="confirmModal">
  <div class="confirm-box">
    <p>Supprimer cette fiche ?</p><span id="confirmSiteName"></span>
    <div class="confirm-actions">
      <button class="btn-delete" style="flex:1" onclick="doDelete()">Supprimer</button>
      <button class="btn-cancel" style="flex:1" onclick="closeConfirm()">Annuler</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

function saveVitrerie(){ try{localStorage.setItem('starsnett_vitrerie',JSON.stringify(VITRERIE));}catch(e){} triggerAutoSync(); }
function vFreqDays(f){ return {bimensuel:15,mensuel:30,trimestriel:90,annuel:365}[f]||30; }
function vNextDate(t){ if(!t.dernierFait)return null; var d=new Date(t.dernierFait); d.setDate(d.getDate()+vFreqDays(t.frequence)); return d.toISOString().substring(0,10); }
function vStatus(t){
  if(!t.dernierFait) return 'todo';
  var nd=vNextDate(t); if(!nd) return 'ok';
  var today=new Date(); today.setHours(0,0,0,0);
  var diff=Math.round((new Date(nd)-today)/(1000*60*60*24));
  if(diff<0) return 'overdue';
  if(diff<=7) return 'soon';
  return 'ok';
}
function vMarkDone(idx,dateVal){
  VITRERIE[idx].dernierFait = dateVal || new Date().toISOString().substring(0,10);

}

// ===================== VITRERIE BADGE sur fiches =====================
function getVitrerieBadge(siteName){
  if(!siteName||typeof VITRERIE==='undefined') return '';
  var sn=siteName.trim().toUpperCase();
  var matches=VITRERIE.filter(function(t){
    if(!t.site) return false;
    var ts=t.site.toUpperCase();
    return ts.indexOf(sn)>=0 || sn.indexOf(ts)>=0 || ts.split(' ')[0]===sn.split(' ')[0];
  });
  if(matches.length===0) return '';
  var statuses=matches.map(function(t){return vStatus(t);});
  var worst=statuses.indexOf('overdue')>=0?'overdue':statuses.indexOf('soon')>=0?'soon':statuses.indexOf('todo')>=0?'todo':'ok';
  var t=matches.find(function(x){return vStatus(x)===worst;})||matches[0];
  var nd=vNextDate(t);
  var today=new Date(); today.setHours(0,0,0,0);
  if(worst==='overdue'){
    var diff=nd?Math.abs(Math.round((new Date(nd)-today)/(1000*60*60*24))):0;
    return '<span class="badge-vitrerie-overdue">\uD83E\uDE9F VITRES EN RETARD '+(nd?diff+'j':'')+'</span>';
  }
  if(worst==='soon'){
    var diff2=nd?Math.round((new Date(nd)-today)/(1000*60*60*24)):0;
    return '<span class="badge-vitrerie-soon">\uD83E\uDE9F VITRES J-'+diff2+'</span>';
  }
  if(worst==='todo'){
    return '<span class="badge-vitrerie-todo">\uD83E\uDE9F VITRES A PLANIFIER</span>';
  }
  if(nd){
    return '<span class="badge-vitrerie-ok">\uD83E\uDE9F Vitres '+fmtDateShort(nd)+'</span>';
  }
  return '';
}

function addHistory(site,action){var now=new Date();HISTORY.unshift({site:site,action:action,who:'Admin',date:now.toISOString(),dateStr:now.toLocaleDateString('fr-FR')+' '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})});saveHistory();}
function getHistory(sn){return HISTORY.filter(function(h){return h.site===sn;});}

function siteKey(s){return(s.n+'||'+s.a).replace(/\s+/g,' ').trim();}
function getAbsences(s){return ABSENCES[siteKey(s)]||[];}
function addAbsence(s,date,type,note){var k=siteKey(s);if(!ABSENCES[k])ABSENCES[k]=[];ABSENCES[k].unshift({date:date,type:type,note:note,id:Date.now()});saveAbsences();}
function removeAbsence(s,id){var k=siteKey(s);if(!ABSENCES[k])return;ABSENCES[k]=ABSENCES[k].filter(function(a){return a.id!==id;});saveAbsences();}
function fmtDateShort(d){if(!d)return '';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function typeLabel(t){if(t==='absence')return 'Absence';if(t==='retard')return 'Retard';if(t==='non-effectue')return 'Non effectue';return t;}
function todayStr(){var n=new Date(),m=n.getMonth()+1,d=n.getDate();return n.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(d<10?'0':'')+d;}

var COLORS=['#3A86FF','#E63946','#2A9D8F','#E9C46A','#F4A261','#8338EC','#06D6A0','#FB5607','#FFCA3A','#4CC9F0','#FF595E','#52B788','#457B9D','#6A4C93','#B5179E'];
var JOURS_FR=['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
var JOURS_SHORT=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
var CM={};
var view='today',selAgent=null,selDay=new Date().getDay(),editIdx=null;
var comptaFilter='all',comptaAgent='',comptaPeriod='all',comptaCustomMonth='',comptaViewMode='list';
var calMonth=new Date().getMonth(),calYear=new Date().getFullYear(),calSelectedDay=null;

function buildColorMap(){CM={};var names=[];DATA.forEach(function(s){if(s.a&&s.a!=='NON ASSIGNE'&&names.indexOf(s.a)<0)names.push(s.a);});names.forEach(function(n,i){CM[n]=COLORS[i%COLORS.length];});}
buildColorMap();
function gc(n){return CM[n]||'#8892A4';}
function ini(n){return(n||'?').split(/\s+/).map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();}
function parseJours(j){if(!j)return[];var t=j.toUpperCase(),result=[];var rm=t.match(/(?:DU\s+)?(\w+)\s+(?:AU|A)\s+(\w+)/);if(rm){var fr=JOURS_FR.indexOf(rm[1]),to=JOURS_FR.indexOf(rm[2]);if(fr>=0&&to>=0){for(var d=fr;d<=to;d++)result.push(d);return result;}}if(t.indexOf('7/7')>=0||t.indexOf('TOUS')>=0)return[0,1,2,3,4,5,6];for(var i=0;i<JOURS_FR.length;i++){if(t.indexOf(JOURS_FR[i])>=0)result.push(i);}if(t.indexOf('WEEK')>=0||t.indexOf('WK')>=0){if(result.indexOf(6)<0)result.push(6);if(result.indexOf(0)<0)result.push(0);}return result;}
function getAgents(){var m={};DATA.forEach(function(s){if(!s.a||s.a==='NON ASSIGNE')return;if(!m[s.a])m[s.a]={name:s.a,sites:[]};m[s.a].sites.push(s);});return Object.values(m).sort(function(a,b){return b.sites.length-a.sites.length;});}

function closeModal(){document.getElementById('editModal').classList.remove('open');editIdx=null;}
function saveEdit(){
  var prev=editIdx>=0?JSON.parse(JSON.stringify(DATA[editIdx])):null;
  var s={n:document.getElementById('fldNom').value.trim(),a:document.getElementById('fldAgent').value.trim(),adr:document.getElementById('fldAdresse').value.trim(),j:document.getElementById('fldJours').value.trim(),f:document.getElementById('fldFreq').value.trim(),t:'',v:document.getElementById('fldVitrerie').value.trim(),duree:document.getElementById('fldDuree').value.trim(),notes:document.getElementById('fldNotes').value.trim(),dateContrat:document.getElementById('fldDateContrat').value.trim()||undefined,photo:(editIdx>=0&&DATA[editIdx]?DATA[editIdx].photo:undefined)||undefined};
  var fr=document.getElementById('fldResiliation'),fi=document.getElementById('fldImpaye');
  if(fr&&fr.checked)s.resiliation={dateFin:document.getElementById('fldDateFin').value,note:document.getElementById('fldNoteResil').value.trim()};
  if(fi&&fi.checked){s.impaye=true;s.montantImpaye=document.getElementById('fldMontantImpaye').value||'';}
  if(window._pendingPhoto!==undefined){s.photo=window._pendingPhoto;window._pendingPhoto=undefined;}
  if(!s.n){alert('Le nom du site est obligatoire.');return;}
  if(editIdx===-1){DATA.push(s);addHistory(s.n,'Nouveau site cree');showToast('Site ajoute');}
  else{DATA[editIdx]=s;var chg=[];if(prev.n!==s.n)chg.push('Nom modifie');if(prev.a!==s.a)chg.push('Agent modifie');addHistory(s.n,chg.length?chg.join(' | '):'Fiche modifiee');showToast('Fiche mise a jour');}

}

  var vbadge=getVitrerieBadge(s.n);
  d.innerHTML='<div class="cnm">'+s.n+'</div>'
    +'<div class="cag" style="color:'+c+'">\uD83D\uDC64 '+s.a+'</div>'
    +(s.adr?'<div class="cadr">\uD83D\uDCCD '+s.adr.substring(0,80)+(s.adr.length>80?'...':'')+'</div>':'')
    +(s.j?'<div class="cjr">\uD83D\uDCC5 '+s.j.substring(0,60)+(s.j.length>60?'...':'')+'</div>':'')
    +(s.f?'<div style="font-size:11px;color:#E9C46A">\uD83D\uDD04 '+s.f+'</div>':'')
    +(s.duree?'<div style="font-size:11px;color:#2A9D8F;">\u23F1\uFE0F '+s.duree+'h / passage</div>':'')
    +(function(){var b=ancienneteBadge(s.n,s.dateContrat);return b?'<div style="margin-top:3px">'+b+'</div>':'';}())
    +(s.resiliation&&s.resiliation.dateFin?'<div style="margin-top:4px"><span class="badge-resil">RESILIATION \u2014 fin le '+(function(dt){var p=dt.split('-');return p[2]+'/'+p[1]+'/'+p[0];})(s.resiliation.dateFin)+'</span></div>':'')
    +(s.impaye?'<div style="margin-top:2px"><span class="badge-impaye">IMPAYE'+(s.montantImpaye?' \u2014 '+s.montantImpaye+' \u20AC':'')+'</span></div>':'')
    // ★ BADGE VITRERIE
    +(vbadge?'<div style="margin-top:2px">'+vbadge+'</div>':'')
    +(s.notes?'<div class="notes-section"><div class="notes-label">Consignes</div><div class="notes-text">'+s.notes.substring(0,120)+(s.notes.length>120?'...':'')+'</div></div>':'')
    +(s.photo?'<div style="margin-top:8px;border-radius:8px;overflow:hidden;border:1px solid #2A2D3E;cursor:pointer" onclick="event.stopPropagation();showPhotoIdx('+DATA.indexOf(s)+')"><img src="'+s.photo+'" style="width:100%;max-height:120px;object-fit:cover;display:block"></div>':'');

  var absDiv=document.createElement('div');
  var absId='abs_'+idx+'_'+Date.now();
  absDiv.innerHTML='<div class="abs-toggle" onclick="toggleAbs(\''+absId+'\')"><span style="font-size:12px">\u26A0\uFE0F</span><span class="abs-toggle-label">Absences / Passages non effectues</span><span class="abs-count'+(abs.length===0?' zero':'')+'">'+abs.length+'</span></div>';
  var listDiv=document.createElement('div');listDiv.className='abs-list';listDiv.id=absId;
  abs.forEach(function(a){var item=document.createElement('div');item.className='abs-item type-'+a.type;item.innerHTML='<div class="abs-item-info"><div class="abs-item-date">'+fmtDateShort(a.date)+'</div><span class="abs-item-type">'+typeLabel(a.type)+'</span>'+(a.note?'<div class="abs-item-note">'+a.note+'</div>':'')+'</div>';if(isAdminMode()){var db=document.createElement('button');db.className='abs-del-btn';db.textContent='\u2715';(function(sid,aid){db.onclick=function(e){e.stopPropagation();removeAbsence(sid,aid);render();};})(s,a.id);item.appendChild(db);}listDiv.appendChild(item);});
  var ar=document.createElement('div');ar.className='abs-add-row';
  var di=document.createElement('input');di.type='date';di.value=todayStr();di.onclick=function(e){e.stopPropagation();};
  var ts=document.createElement('select');ts.innerHTML='<option value="absence">Absence</option><option value="non-effectue">Non effectue</option><option value="retard">Retard</option>';ts.onclick=function(e){e.stopPropagation();};
  var ni=document.createElement('input');ni.type='text';ni.placeholder='Note (optionnel)';ni.onclick=function(e){e.stopPropagation();};
  var sb=document.createElement('button');sb.className='abs-save-btn';sb.textContent='+ Ajouter';
  (function(sid,aidEl,tid,nid){sb.onclick=function(e){e.stopPropagation();if(!aidEl.value){alert('Choisissez une date');return;}addAbsence(sid,aidEl.value,tid.value,nid.value.trim());render();};})(s,di,ts,ni);
  ar.appendChild(di);ar.appendChild(ts);ar.appendChild(ni);ar.appendChild(sb);listDiv.appendChild(ar);absDiv.appendChild(listDiv);d.appendChild(absDiv);

  if(isAdminMode()){var btn=document.createElement('button');btn.className='edit-btn';btn.title='Modifier';btn.textContent='\u270F\uFE0F';btn.onclick=function(e){e.stopPropagation();openEdit(idx);};d.appendChild(btn);}
  return d;
}

function toggleAbs(id){var el=document.getElementById(id);if(el)el.classList.toggle('open');}

updateModeBadge();
render();

if(JBKEY&&JBBIN){cloudLoad(true);updateSyncBar();}
</script>
</body>
</html>
